name: Dev Branch CI (test + image)

# Triggers on dev/* branches so we can run unit tests and ship a tagged image
# admins can pull for staging validation before merging back to main.
on:
  push:
    branches:
      - 'dev/**'
      - 'dev-*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_SUFFIX: new-api-xifeng

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'skip-test')"
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-lint-and-test
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          cache: true
          go-version-file: go.mod

      - name: Go module tidy
        run: |
          export GOPROXY=https://goproxy.cn,direct
          go mod download

      - name: go vet (changed packages)
        run: |
          go vet ./service/... ./model/... ./controller/... ./router/... ./relay/common/... ./types/... ./setting/operation_setting/...

      - name: go test (focused risk control suite)
        run: |
          go test ./service/... ./model/... ./controller/... -count=1

  build-and-push:
    name: Build And Push Image
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    if: |
      !cancelled() &&
      (needs.lint-and-test.result == 'skipped' || needs.lint-and-test.result == 'success')
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-build-and-push
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Derive lowercase image name
        id: image
        run: |
          OWNER="${{ github.repository_owner }}"
          OWNER_LC="$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')"
          echo "name=${{ env.REGISTRY }}/${OWNER_LC}/${{ env.IMAGE_SUFFIX }}" >> "$GITHUB_OUTPUT"

      - name: Compute branch slug
        id: slug
        run: |
          REF="${GITHUB_REF#refs/heads/}"
          # dev/foo-bar -> dev-foo-bar so it works as a docker tag
          SLUG=$(echo "${REF}" | tr '/' '-' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g')
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "slug=${SLUG}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          # Tag strategy:
          #   - dev-<branch-slug>            : floating tag for the branch tip
          #   - dev-<branch-slug>-<sha7>     : immutable tag pinned to this commit
          tags: |
            type=raw,value=${{ steps.slug.outputs.slug }}
            type=raw,value=${{ steps.slug.outputs.slug }}-${{ steps.slug.outputs.short_sha }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print pull instructions
        env:
          # metadata-action emits tags newline-separated; pass through env so
          # the shell never tries to parse the value as inline syntax.
          META_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          echo "Pull this dev image with:"
          printf '%s\n' "${META_TAGS}" | while IFS= read -r tag; do
            [ -z "${tag}" ] && continue
            echo "  docker pull ${tag}"
          done
